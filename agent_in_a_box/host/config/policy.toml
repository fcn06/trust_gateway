# ─────────────────────────────────────────────────────────────
# Trust Gateway Policy Configuration
#
# Replaces the old policy.json safe_tools array with
# attribute-based, priority-ordered rules.
#
# Rules are evaluated in priority order (lowest number first).
# First match wins.
#
# Effects:
#   allow           — action proceeds immediately
#   deny            — action is blocked
#   require_approval — action requires human approval (tier1/tier2)
#   require_proof    — action requires OID4VP verifiable presentation (tier3)
#
# Corrected OID4VP flow: The USER (holder) presents proof,
# the gateway (verifier) checks it.
# ─────────────────────────────────────────────────────────────

# ── Tier 0: Auto-Allow ────────────────────────────────────

[[rules]]
id = "read-actions-auto-allow"
priority = 10
operation_kinds = ["read"]
effect = "allow"


[[rules]]
id = "meta-tools-auto-allow"
priority = 11
action_names = ["switch_context", "list_bundles", "discover_agent_services"]
effect = "allow"

[[rules]]
id = "claw-native-tools-allow"
priority = 15
action_names = ["claw_hello_world", "claw_weather", "read_skill", "claw_extract_content_from_url"]
effect = "allow"

[[rules]]
id = "mcp-search-allow"
priority = 16
action_names = ["vp_search"]
categories = ["vp", "search"]
effect = "allow"

[[rules]]
id = "allow-weather-webhooks"
priority = 25
action_names = ["webhook.weather_trigger"]
effect = "allow"

# ── Tier 1: Portal Click ──────────────────────────────────

[[rules]]
id = "calendar-create-needs-approval"
priority = 20
action_names = ["google_calendar_create_event"]
effect = "require_approval"
tier = "tier1"
reason = "Calendar event creation requires portal approval"

[[rules]]
id = "shopify-order-update"
priority = 21
action_names = ["shopify_order_update"]
effect = "require_approval"
tier = "tier1"
reason = "Order modifications require portal approval"

# ── Tier 2: Re-Authentication ─────────────────────────────

[[rules]]
id = "refund-above-100eur"
priority = 30
action_names = ["shopify_order_refund_create"]
min_amount = "100.00 EUR"
effect = "require_approval"
tier = "tier2"
reason = "Refunds above €100 require re-authentication"

# ── Tier 3: OID4VP Verified Presentation ──────────────────
# The USER presents proof via their wallet.
# The gateway verifies the presented credential.

[[rules]]
id = "payout-change-needs-proof"
priority = 40
tags = ["payout_change"]
effect = "require_proof"
proof_type = "openid4vp"
required_claims = ["role:finance_approver"]
reason = "Changing payout details requires the user to present proof of finance authorization"

[[rules]]
id = "identity-change-needs-proof"
priority = 41
tags = ["identity_change"]
effect = "require_proof"
proof_type = "openid4vp"
required_claims = ["role:legal_representative"]
reason = "Modifying legal entity data requires the user to present proof of legal authority"

[[rules]]
id = "large-refund-needs-proof"
priority = 42
action_names = ["shopify_order_refund_create"]
min_amount = "500.00 EUR"
effect = "require_proof"
proof_type = "openid4vp"
required_claims = ["role:senior_customer_service"]
reason = "Refunds above €500 require the user to present proof of senior authority"

# ── PicoClaw Source-Specific Rules ────────────────────────
# These rules apply only to actions proposed by PicoClaw.
# PicoClaw is treated as a less-trusted external planner.
# The fail-closed default deny at priority 999 ensures no
# PicoClaw action can execute without explicit permission.

[[rules]]
id = "picoclaw-read-allow"
priority = 100
source_types = ["picoclaw"]
action_names = ["vp_search"]
categories = ["vp", "search"]
operation_kinds = ["read"]
effect = "allow"

[[rules]]
id = "picoclaw-write-approval"
priority = 110
source_types = ["picoclaw"]
operation_kinds = ["create", "update", "delete"]
effect = "require_approval"
tier = "tier1"
reason = "PicoClaw-originated write actions require portal approval"

[[rules]]
id = "picoclaw-transfer-proof"
priority = 120
source_types = ["picoclaw"]
operation_kinds = ["transfer"]
effect = "require_proof"
proof_type = "openid4vp"
required_claims = ["role:finance_approver"]
reason = "PicoClaw-originated transfer actions require proof of authority"

[[rules]]
id = "picoclaw-default-deny"
priority = 999
source_types = ["picoclaw"]
effect = "deny"
reason = "Unclassified PicoClaw actions are denied by default (fail-closed)"

[[rules]]
id = "skill-inspect-schema-explorer"
priority = 50
action_names = ["inspect_schema", "generate_markdown"]
effect = "require_proof"
proof_type = "openid4vp"
required_claims = ["role:data_explorer"]
reason = "Explorer role or above is required to inspect dataset schema or generate markdown"

[[rules]]
id = "skill-sample-rows-analyst"
priority = 51
action_names = ["sample_rows", "compute_statistics"]
effect = "require_proof"
proof_type = "openid4vp"
required_claims = ["role:data_analyst"]
reason = "Analyst role or above is required to sample dataset rows or compute stats"

[[rules]]
id = "skill-join-datasets-senior"
priority = 52
action_names = ["join_datasets", "detect_anomalies"]
effect = "require_proof"
proof_type = "openid4vp"
required_claims = ["role:senior_data_analyst"]
reason = "Senior Analyst role is required to join datasets or detect anomalies"

[[rules]]
id = "guest-explicit-deny-for-skills"
priority = 53
action_names = ["inspect_schema", "generate_markdown", "sample_rows", "compute_statistics", "join_datasets", "detect_anomalies"]
auth_methods = ["guest"]
effect = "deny"
reason = "Guest identities are explicitly denied from executing data analyst skills"
