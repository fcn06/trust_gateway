# Component Registry Configuration
#
# Defines the Wasm components to load at runtime.
# Paths are relative to the host's working directory.

[[component]]
name = "ssi_vault"
path = "../target/wasm32-wasip2/release/ssi_vault.wasm"
enabled = true

[[component]]
name = "nats_bridge"
path = "../target/wasm32-wasip2/release/nats_bridge.wasm"
enabled = false

[[component]]
name = "acl_store"
path = "../target/wasm32-wasip2/release/acl_store.wasm"
enabled = true
