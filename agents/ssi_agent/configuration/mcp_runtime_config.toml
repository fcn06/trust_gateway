#################################################################
# Config for MCP Runtime for Agent
#################################################################

#################################################################
# General parameters
#################################################################
agent_mcp_role_tool = "tool"
agent_mcp_system_prompt= "You are a highly capable agent working within a secure, bundle-restricted environment. ALWAYS check your available tools first and use them directly if they can fulfill the user's request. If you receive a message with a role called \"tool\", you must use the response from tools in order to build a final answer.\n\n## 🔄 Dynamic Context Switching (Resilience Engine)\nTo maintain security and isolation, tools are grouped into semantic 'bundles' (e.g., 'discovery', 'default_tools', 'analysis'). You can only see and execute tools belonging to your active bundle. \n\nIf the user requests an action (such as checking the weather, managing calendars, or analyzing schemas) that requires a tool NOT currently visible in your active list:\n1. Call `search_skills` or `list_bundles` to identify which bundle contains the target tool.\n2. Call `switch_context(bundle_name: \"<bundle>\")` to activate that bundle.\n3. The runtime will immediately refresh your tool list, enabling you to invoke the target tool in the subsequent step.\n\nNever assume a tool is unavailable without searching and attempting to switch context first."
agent_mcp_role_assistant = "assistant"
agent_mcp_tool_choice_auto = "auto"
agent_mcp_finish_reason_tool_calls = "tool_calls"
agent_mcp_finish_reason_stop = "stop"
# max number of loops that the agent will execute
agent_mcp_max_loops = 15
agent_mcp_evaluation_prompt = "Please evaluate the previous tool results. If the results are satisfactory, respond with 'OK'. If they are unsatisfactory, provide a brief explanation of the issue."
agent_mcp_correction_prompt = "The previous tool execution failed. Please analyze the issue and try to correct it."

#################################################################
# Parameters of the MCP middleware to connect to
# You can define an MCP Server API Key here 
# to connect to this mcp server
#################################################################
#agent_mcp_server_url="http://127.0.0.1:2000/sse"
agent_mcp_server_url="http://127.0.0.1:3060/v1/mcp/sse"
#################################################################
# NATS Configuration for V5 Agent Delegation (Scenario 2)
# Multiplexed MCP via trust_gateway
#################################################################
agent_mcp_nats_url="nats://localhost:4222"
agent_mcp_nats_dispatch_subject="trust.v1"

agent_mcp_server_api_key="<YOUR_API_KEY>"

#################################################################
# Define her the url of openai compatible endpoint 
# as well as the model to use
# api key for the mcp runtime needs to be defined as
# env variable. Below you can define the name it points to
#################################################################
agent_mcp_llm_api_key_env_var="LLM_MCP_API_KEY" 
# future use, when content is too big, sanitizer will compact it
agent_mcp_sanitizer_model_id="llama-3.1-8b-instant"
agent_mcp_model_id="openai/gpt-oss-20b"
agent_mcp_llm_url="https://api.groq.com/openai/v1/chat/completions"

#################################################################
# In case you want to launch a rest endpoint to interact 
# with mcp runtime agent, here is the url
#################################################################
#agent_mcp_endpoint="http://localhost:2500/"
