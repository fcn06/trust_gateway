# Component Registry Configuration
#
# Defines the Wasm components to load at runtime.
# Paths are relative to the host's working directory.

[[component]]
name = "ssi_vault"
path = "../target/wasm32-wasip2/release/ssi_vault.wasm"
enabled = true

[[component]]
name = "nats_bridge"
path = "../target/wasm32-wasip2/release/nats_bridge.wasm"
enabled = false

[[component]]
name = "acl_store"
path = "../target/wasm32-wasip2/release/acl_store.wasm"
enabled = true

[[component]]
name = "messaging_service"
path = "../target/wasm32-wasip2/release/messaging_service.wasm"
enabled = true

[[component]]
name = "mls_session"
path = "../target/wasm32-wasip2/release/mls_session.wasm"
enabled = true

[[component]]
name = "contact_store"
path = "../target/wasm32-wasip2/release/contact_store.wasm"
enabled = true
